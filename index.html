<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORK!!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root { --orange: #FF8C00; --black: #000000; }

        body {
            background-color: var(--black);
            color: var(--orange);
            font-family: 'VT323', monospace;
            margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; text-transform: uppercase;
        }

        /* Retro Effects */
        .flicker {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 140, 0, 0.02); z-index: 5; pointer-events: none;
            animation: flicker-run 0.1s infinite;
        }
        @keyframes flicker-run { 0%, 100% { opacity: 0.01; } 50% { opacity: 0.04; } }
        
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px; z-index: 10; pointer-events: none;
        }

        #main-view, #timer-view, #carousel-view { text-align: center; width: 100%; z-index: 2; }
        #timer-view, #carousel-view { display: none; }

        .message-text { font-size: 6rem; line-height: 1.1; text-shadow: 0 0 10px var(--orange); }

        /* UI BUTTONS */
        .ui-btn {
            position: absolute; border: 2px solid var(--orange); 
            background: transparent; color: var(--orange);
            font-family: 'VT323', monospace; font-size: 1.4rem;
            padding: 8px 18px; cursor: pointer; z-index: 20;
        }
        .ui-btn:hover { background: var(--orange); color: var(--black); }

        .top-right { top: 20px; right: 20px; }
        .bottom-right { bottom: 20px; right: 20px; }
        .bottom-left { bottom: 20px; left: 20px; }

        /* Footer Style */
        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0.7;
            z-index: 20;
            text-shadow: 0 0 5px var(--orange);
        }

        /* Focus Button */
        .focus-cloud {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            border: 3px solid var(--orange); padding: 15px 35px;
            cursor: pointer; background: transparent; color: var(--orange);
            font-family: 'VT323', monospace; font-size: 2rem;
            box-shadow: 6px 6px 0px var(--orange);
        }

        /* Session Stars */
        .session-tracker { font-size: 3rem; margin-bottom: 10px; letter-spacing: 12px; }
        .star { opacity: 0.2; }
        .star.active { opacity: 1; text-shadow: 0 0 15px var(--orange); }

        .timer-display { font-size: 10rem; line-height: 0.8; margin-bottom: 25px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 350px; margin: 0 auto; }

        /* Motivation Carousel */
        .quote-box { font-size: 4.5rem; max-width: 85%; margin: 0 auto 40px auto; text-shadow: 0 0 10px var(--orange); height: 200px; display: flex; align-items: center; justify-content: center; }

        .sleek-btn {
            background: transparent; border: none; border-bottom: 2px solid var(--orange);
            color: var(--orange); font-family: 'VT323', monospace; font-size: 1.8rem;
            padding: 5px 20px; cursor: pointer; margin: 0 15px; transition: 0.3s;
        }
        .sleek-btn:hover { letter-spacing: 3px; border-bottom-width: 4px; }

        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
        }
        .vibrate { animation: shake 0.1s infinite; }
    </style>
</head>
<body>

    <div class="flicker"></div>

    <button class="ui-btn top-right" onclick="resetToHome()">[ EXIT ]</button>
    <button class="ui-btn bottom-right" onclick="toggleFullscreen()">[ FULLSCREEN ]</button>
    <button class="ui-btn bottom-left" onclick="showCarousel()">[ MOTIVATION ]</button>

    <div class="footer">MADE WITH LOVE AR <3</div>

    <div id="main-view">
        <div class="message-text" id="typewriter"></div>
        <button class="focus-cloud" onclick="startPomodoro()">[ FOCUS ]</button>
    </div>

    <div id="timer-view">
        <div class="session-tracker">
            <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
        </div>
        <div id="status" style="font-size: 1.8rem; margin-bottom: 10px;">MODE: READY</div>
        <div class="timer-display" id="display">25:00</div>
        
        <div class="controls">
            <button class="ui-btn" style="position:static" id="toggle-btn" onclick="togglePause()">PAUSE</button>
            <button class="ui-btn" style="position:static" onclick="manualBreak()">BREAK</button>
            <button class="ui-btn" style="position:static" onclick="restartTimer()">RESTART</button>
            <button class="ui-btn" style="position:static" onclick="resetToHome()">RESET</button>
        </div>
    </div>

    <div id="carousel-view">
        <div class="quote-box" id="quote-display">DISCIPLINE IS KEY</div>
        <div>
            <button class="sleek-btn" onclick="prevQuote()">PREV</button>
            <button class="sleek-btn" onclick="hideCarousel()" style="border-bottom-color: white; color: white;">BACK</button>
            <button class="sleek-btn" onclick="nextQuote()">NEXT</button>
        </div>
    </div>

    <script>
        const text = "UNTIL ITS DONE\nTELL NONE";
        const typewriterElement = document.getElementById('typewriter');
        let typeIndex = 0;
        let typeTimeout;

        function type() {
            if (typeIndex < text.length) {
                typewriterElement.innerHTML += text[typeIndex] === "\n" ? "<br>" : text[typeIndex];
                typeIndex++;
                typeTimeout = setTimeout(type, 100);
            }
        }

        function resetToHome() {
            clearInterval(timerId);
            clearTimeout(typeTimeout);
            document.getElementById('timer-view').style.display = 'none';
            document.getElementById('carousel-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            typeIndex = 0;
            typewriterElement.innerHTML = "";
            setTimeout(type, 500);
        }

        setTimeout(type, 500);

        let timeLeft, timerId = null, isPaused = false, sessionsCompleted = 0, currentMode = "WORK";

        function updateStars() {
            const stars = document.querySelectorAll('.star');
            stars.forEach((s, i) => s.classList.toggle('active', i < sessionsCompleted));
        }

        function startPomodoro() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('timer-view').style.display = 'block';
            startWork();
        }

        function startWork() {
            clearInterval(timerId); currentMode = "WORK"; timeLeft = 25 * 60;
            document.getElementById('status').innerText = "MODE: WORKING"; runTimer();
        }

        function manualBreak() {
            clearInterval(timerId); currentMode = "BREAK"; timeLeft = 5 * 60;
            document.getElementById('status').innerText = "MODE: BREAK"; runTimer();
        }

        function restartTimer() {
            if (currentMode === "WORK") startWork();
            else if (currentMode === "BREAK") manualBreak();
            else startLongBreak();
        }

        function runTimer() {
            isPaused = false; document.getElementById('toggle-btn').innerText = "PAUSE";
            updateDisplay();
            timerId = setInterval(() => {
                if (!isPaused) {
                    timeLeft--; updateDisplay();
                    if (timeLeft <= 0) handleTimerEnd();
                }
            }, 1000);
        }

        function handleTimerEnd() {
            clearInterval(timerId); document.body.classList.add('vibrate');
            if (currentMode === "WORK") {
                sessionsCompleted++; updateStars();
                if (sessionsCompleted >= 4) { sessionsCompleted = 0; startLongBreak(); } 
                else { manualBreak(); }
            } else { startWork(); }
            setTimeout(() => { document.body.classList.remove('vibrate'); }, 2000);
        }

        function startLongBreak() {
            currentMode = "LONG_BREAK"; timeLeft = 10 * 60;
            document.getElementById('status').innerText = "MODE: LONG BREAK"; runTimer();
        }

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('display').innerText = `${mins}:${secs}`;
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('toggle-btn').innerText = isPaused ? "RESUME" : "PAUSE";
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } 
            else { if (document.exitFullscreen) { document.exitFullscreen(); } }
        }

        const quotes = [
             "DISCIPLINE IS KEY", "BE THE WINNER", "MOTIVATION FADES, HARD WORK DOESN'T",
             "CHASE YOUR DREAMS", "WHAT YOU DO NOW SHAPES WHO YOU BECOME",
             "THE PRODIGY", "LET YOUR SUCCESS BE YOUR NOISE.", "STAY HUNGRY. STAY FOOLISH.",
             "EXECUTION IS EVERYTHING.", "THE LEADER", "DON'T STOP UNTIL YOU'RE PROUD.",
             "QUIET PEOPLE HAVE THE LOUDEST MINDS."
        ];
        let qIndex = 0;
        function showCarousel() { 
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('timer-view').style.display = 'none';
            document.getElementById('carousel-view').style.display = 'block'; 
        }
        function hideCarousel() { 
            document.getElementById('carousel-view').style.display = 'none'; 
            if (timerId) document.getElementById('timer-view').style.display = 'block';
            else document.getElementById('main-view').style.display = 'block';
        }
        function nextQuote() { qIndex = (qIndex + 1) % quotes.length; document.getElementById('quote-display').innerText = quotes[qIndex]; }
        function prevQuote() { qIndex = (qIndex - 1 + quotes.length) % quotes.length; document.getElementById('quote-display').innerText = quotes[qIndex]; }
    </script>
</body>
</html>
